<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Online | Révolution</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✍️</text></svg>">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="description" content="Un éditeur de texte minimaliste, immersif et hors-ligne.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Write Online Revolution">
    <meta property="og:description" content="Écrivez n'importe où, n'importe quand.">
    <meta property="og:type" content="website">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
    
    <!-- Quill CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <!-- App Styles -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Scripts Externes -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- P2P et Logique gérés via des modules dynamiques (assets/js/...) -->
</head>
<body data-theme="light">
    <script>
        // Application immédiate du thème pour éviter le flash blanc
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
    </script>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <i data-lucide="pen-tool" style="color: var(--accent)"></i>
            <span>WriteOnline</span>
        </div>
        
        <div class="sidebar-actions" style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
            <button class="btn-icon" id="new-doc-btn" style="flex: 1; gap: 0.5rem;">
                <i data-lucide="plus"></i> Nouveau
            </button>
            <button class="btn-icon" id="new-folder-btn" title="Nouveau Dossier">
                <i data-lucide="folder-plus"></i>
            </button>
        </div>

        <div class="search-container" style="margin-bottom: 1.5rem;">
            <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" id="search-input" name="search" placeholder="Rechercher...">
            </div>
        </div>

        <div class="doc-list" id="doc-list">
            <!-- Documents et Dossiers injectés ici -->
        </div>

        <div class="sidebar-footer">
            <button class="btn-icon" id="theme-toggle" title="Changer le thème">
                <i data-lucide="moon"></i>
            </button>
            <div class="export-group">
                <button class="btn-icon" id="export-all" title="Exporter en TXT">
                    <i data-lucide="file-text"></i>
                </button>
                <button class="btn-icon" id="export-pdf" title="Exporter en PDF">
                    <i data-lucide="file-type"></i>
                </button>
                <button class="btn-icon" id="export-md" title="Exporter en Markdown">
                    <i data-lucide="hash"></i>
                </button>
            </div>
            <button class="btn-icon" id="settings-btn" title="Paramètres">
                <i data-lucide="settings"></i>
            </button>
            <button class="btn-icon" id="pwa-install-btn" title="Installer l'Application" style="display: none; color: var(--accent); border-color: var(--accent);">
                <i data-lucide="download"></i>
            </button>
        </div>
        
        <div class="sidebar-quote" id="sidebar-quote">
            <!-- Une citation inspirante s'affichera ici -->
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <nav class="top-nav">
            <div class="title-container">
                <button class="btn-icon" id="toggle-sidebar">
                    <i data-lucide="menu"></i>
                </button>
                <input type="text" id="doc-title" name="doc-title" placeholder="Titre du document..." value="Mon Premier Brouillon">
                <div class="doc-meta-header" style="display: flex; gap: 0.5rem; align-items: center;">
                    <select id="doc-status-select" name="doc-status" class="status-badge-select">
                        <option value="draft">Brouillon</option>
                        <option value="review">En révision</option>
                        <option value="final">Finalisé</option>
                    </select>
                </div>
                <span id="save-indicator">Prêt</span>
            </div>

            <div id="presence-list" class="presence-list"></div>
            
            <div class="action-bar">
                <button class="btn-icon" id="collab-btn" title="Collaborer en temps réel" style="border-color: var(--accent); color: var(--accent);">
                    <i data-lucide="users"></i>
                </button>
                <button class="btn-icon" id="save-btn" title="Sauvegarder">
                    <i data-lucide="save"></i>
                </button>
                <button class="btn-icon" id="share-btn" title="Partager (Natif ou Lien)">
                    <i data-lucide="share-2"></i>
                </button>
                <button class="btn-icon" id="distraction-btn" title="Mode concentration">
                    <i data-lucide="maximize"></i>
                </button>
            </div>
        </nav>

        <section class="editor-section">
            <div class="editor-card glass">
                <div class="reading-progress-container">
                    <div id="reading-progress-bar" class="reading-progress-bar"></div>
                </div>
                <div id="toolbar-container"></div>
                <div id="editor-container"></div>
            </div>
        </section>

        <div class="floating-stats glass">
            <span id="word-count">0</span> mots · <span id="read-time">0</span> min lecture
        </div>
    </main>

    <canvas id="power-mode-canvas"></canvas>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content glass settings-modal-large">
            <div class="settings-header">
                <h3><i data-lucide="settings"></i> Configuration</h3>
                <button class="btn-close-modal" id="close-settings"><i data-lucide="x"></i></button>
            </div>
            
            <div class="settings-body">
                <div class="settings-tabs">
                    <button class="tab-btn active" data-tab="appearance"><i data-lucide="palette"></i> Style</button>
                    <button class="tab-btn" data-tab="editor"><i data-lucide="align-left"></i> Éditeur</button>
                    <button class="tab-btn" data-tab="advanced"><i data-lucide="zap"></i> Effets</button>
                </div>

                <div class="tab-content active" id="tab-appearance">
                    <div class="setting-group">
                        <label>Ambiance visuelle</label>
                        <div class="theme-grid">
                            <button class="theme-card" data-theme-val="light" title="Clair"><div class="swatch" style="background: #f0f2f5;"></div></button>
                            <button class="theme-card" data-theme-val="dark" title="Sombre"><div class="swatch" style="background: #0f172a;"></div></button>
                            <button class="theme-card" data-theme-val="sepia" title="Sépia"><div class="swatch" style="background: #f4ecd8;"></div></button>
                            <button class="theme-card" data-theme-val="midnight" title="Midnight"><div class="swatch" style="background: #020617;"></div></button>
                            <button class="theme-card" data-theme-val="cyberpunk" title="Cyberpunk"><div class="swatch" style="background: #050505; border: 1px solid #ff00ff;"></div></button>
                            <button class="theme-card" data-theme-val="forest" title="Forêt"><div class="swatch" style="background: #1a1c18;"></div></button>
                            <button class="theme-card" data-theme-val="terminal" title="Terminal"><div class="swatch" style="background: #000; border: 1px solid #00ff00;"></div></button>
                        </div>
                    </div>
                    <div class="setting-item">
                        <label for="font-select">Police de caractères</label>
                        <select id="font-select">
                            <option value="'Inter', sans-serif">Inter (Sans)</option>
                            <option value="'Merriweather', serif">Merriweather (Serif)</option>
                            <option value="'JetBrains Mono', monospace">JetBrains Mono (Code)</option>
                        </select>
                    </div>
                </div>

                <div class="tab-content" id="tab-editor">
                    <div class="setting-item">
                        <label>Taille du texte (<span id="val-font-size">18</span>px)</label>
                        <input type="range" id="font-size-range" min="12" max="32" value="18">
                    </div>
                    <div class="setting-item">
                        <label>Largeur de page (<span id="val-editor-width">850</span>px)</label>
                        <input type="range" id="editor-width-range" min="400" max="1200" step="50" value="850">
                    </div>
                    <div class="setting-item">
                        <label>Interlignage (<span id="val-line-height">1.8</span>)</label>
                        <input type="range" id="line-height-range" min="1" max="2.5" step="0.1" value="1.8">
                    </div>
                    <div class="setting-item-row">
                        <label>Correction orthographique</label>
                        <label class="switch">
                            <input type="checkbox" id="spellcheck-toggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div class="tab-content" id="tab-advanced">
                    <div class="setting-item-row">
                        <label>Mode Typewriter (Focus central)</label>
                        <label class="switch">
                            <input type="checkbox" id="typewriter-mode-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="setting-item-row">
                        <label>Power Mode (Particules)</label>
                        <label class="switch">
                            <input type="checkbox" id="power-mode-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>Opacité Focus (<span id="val-focus-opacity">0</span>%)</label>
                        <input type="range" id="focus-opacity-range" min="0" max="100" value="0">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Collab Modal -->
    <div class="modal-overlay" id="collab-modal">
        <div class="modal-content glass" style="max-width: 500px;">
            <h3 style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;">
                <i data-lucide="users"></i> Collaboration P2P
            </h3>
            
            <div class="collab-sections">
                <div class="collab-box">
                    <h4>Créer une session</h4>
                    <div class="setting-item">
                        <label for="create-room-name">Nom de la salle</label>
                        <input type="text" id="create-room-name" name="room-name" placeholder="Ex: mon-projet-secret">
                    </div>
                    <div class="setting-item">
                        <label for="create-room-pass">Mot de passe (Optionnel)</label>
                        <input type="password" id="create-room-pass" name="room-password" placeholder="Pour chiffrer les données">
                    </div>
                    <button class="btn-primary" id="btn-create-collab">Démarrer & Copier le lien</button>
                </div>

                <div class="collab-divider"><span>OU</span></div>

                <div class="collab-box">
                    <h4>Rejoindre une session</h4>
                    <div class="setting-item">
                        <label for="join-room-name">Nom de la salle</label>
                        <input type="text" id="join-room-name" name="join-room-name" placeholder="Nom reçu par votre ami">
                    </div>
                    <div class="setting-item">
                        <label for="join-room-pass">Mot de passe</label>
                        <input type="password" id="join-room-pass" name="join-room-pass" placeholder="Si la salle est chiffrée">
                    </div>
                    <button class="btn-secondary" id="btn-join-collab">Rejoindre la salle</button>
                </div>
            </div>
            
            <button class="btn-icon" id="close-collab" style="width: 100%; margin-top: 1.5rem;">Fermer</button>
        </div>
    </div>

    <!-- App Logic -->
    <script type="module" src="assets/js/app.js"></script>

    <!-- Custom Dialog Modal -->
    <div class="modal-overlay" id="custom-dialog-overlay" style="z-index: 3000;">
        <div class="modal-content glass" style="max-width: 400px; text-align: center;">
            <h3 id="custom-dialog-title" style="margin-bottom: 1rem;">Titre</h3>
            <p id="custom-dialog-message" style="margin-bottom: 2rem; color: var(--text-muted); font-size: 0.95rem;">Message</p>
            <div id="custom-prompt-container" style="display: none; margin-bottom: 1.5rem;">
                <label for="custom-prompt-input" class="sr-only">Réponse</label>
                <input type="text" id="custom-prompt-input" name="prompt-response" style="width: 100%; padding: 0.75rem; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-main); font-family: inherit;">
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn-secondary" id="custom-dialog-cancel">Annuler</button>
                <button class="btn-primary" id="custom-dialog-confirm">Confirmer</button>
            </div>
        </div>
    </div>

    <!-- Full Screen Loading Overlay -->
    <div class="modal-overlay" id="loading-overlay" style="z-index: 4000;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem; color: var(--text-main);">
            <i data-lucide="loader-2" class="spin-icon" style="width: 48px; height: 48px; color: var(--accent);"></i>
            <span id="loading-message" style="font-size: 1.2rem; font-weight: 500;">Chargement...</span>
        </div>
    </div>

    <!-- Password Required Modal -->
    <div class="modal-overlay" id="password-modal">
        <div class="modal-content glass" style="max-width: 400px;">
            <h3 style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;">
                <i data-lucide="lock"></i> Mot de passe requis
            </h3>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem;">
                Cette salle peut nécessiter un mot de passe pour déchiffrer le contenu.
            </p>
            <div class="setting-item">
                <label for="input-session-pass" class="sr-only">Mot de passe de la salle</label>
                <input type="password" id="input-session-pass" name="session-pass" placeholder="Mot de passe de la salle (ou vide)">
            </div>
            <button class="btn-primary" id="btn-submit-pass">Accéder à la salle</button>
            <button class="btn-icon" id="cancel-pass" style="width: 100%; margin-top: 1rem;">Rejoindre sans mot de passe</button>
        </div>
    </div>

    <div id="app-version" style="position: fixed; bottom: 10px; right: 10px; opacity: 0.5; font-size: 10px; font-family: sans-serif; pointer-events: none;">
        v8
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>
</body>
</html>
